# gooseloop project config — the committed TEMPLATE.
#
# First time:  cp gooseloop.example.toml gooseloop.toml   (gooseloop.toml is
# gitignored; it points at your own repos and carries your author identity).
#
# Points at the hello-world reference engine by default. A consuming project
# replaces default_engine with their own.

[gooseloop]
default_model = "deepseek/deepseek-v4-flash"
sessions_dir = "reviews/sessions"
default_engine = "engines.hello_world"
max_queue_depth = 50
review_recipe = "review.yaml"
summary_recipe = "summary.yaml"

[gooseloop.retry]
max_retries = 6
base_delay = 5

# hello-world reads its guest list from a file, one name per line.
# First time:  cp names.example.txt names.txt   (names.txt is gitignored)

[hello_world]
names = "names.txt"
greetings_dir = "greetings"

# Example config for the git-recap engine. Edit the paths, then run:
#     python3 -m gooseloop run -e engines.git_recap

[git_recap]
repos = ["/path/to/repo1", "/path/to/repo2"]
# "auto" reads your git user.email. Hardcode the email instead when running
# somewhere git can't read your host config (a container, CI) — "auto" there
# resolves to nothing and the author filter silently matches zero commits.
author = "auto"                    # or "you@example.com"
journal_dir = "journal"            # daily/ and weekly/ entries land under here
state = "git-recap.state.json"     # per-repo commit watermarks (machine-written)
first_run_days = 7                 # window for a repo's very first daily

# Example config for the doc-drift engine. Run it whenever you like:
#     python3 -m gooseloop run -e engines.doc_drift
#
# First time: `cp doc-map.example.toml doc-map.toml` and edit. Your doc-map.toml
# is gitignored (your repos + URLs); doc-map.example.toml is the committed
# template. The engine reads the canonical→derived map, finds derived docs (or
# live pages) that fell behind their canonical source, and drafts a patch for
# each (to seal, never auto-applied). Paths are relative to cwd, like
# git_recap's output_dir — run from this dir.

[doc_drift]
map = "doc-map.toml"               # the canonical→derived map (gitignored; copy the .example)
state = "doc-map.state.json"       # the engine's own cross-run memory (machine-written)
drafts_dir = "doc-drift-drafts"    # where per-pair patch drafts land
# Doc-root discovery: dirs to scan for markdown areas no collection glob covers.
# Empty/absent = off. Discovery never roams outside these. Relative to the map.
discovery_roots = ["/path/to/docs-repo"]
