name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      # The Makefile is the check contract: `make check` is what the
      # developer runs before pushing, so CI runs the same umbrella.
      # uv sync created ./.venv, which is the Makefile's default PYTHON.
      - name: Run checks
        run: make check
