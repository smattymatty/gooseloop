version: "1.0.0"
title: "greet one name"
description: "Body phase: write a greeting for one name into GREETING_FILE."

prompt: |
  Write a one-line greeting addressed to ${NAME}.

  Save the greeting to the EXACT path:

      ${GREETING_FILE}

  (The engine's BranchPolicy computes this path from the routing params
  and the framework injects it as GREETING_FILE; the run refuses to start
  if this recipe stops referencing it. Do NOT use any other filename.)
  Ensure the parent directory exists. Output nothing else of substance.

settings:
  goose_provider: "openrouter"
  goose_model: "anthropic/claude-haiku-4-5"

extensions:
  - type: builtin
    name: developer
