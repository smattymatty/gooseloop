version: "1.0.0"
title: "greet one name"
description: "Body phase: write a greeting for one name into GREETINGS_DIR/${NAME}.txt."

prompt: |
  Write a one-line greeting addressed to ${NAME}.

  Save the greeting to the EXACT path:

      ${OUTPUT_PATH}

  (This path is computed by the framework from the routing params.
  Do NOT use any other filename.) Ensure the parent directory exists.
  Output nothing else of substance.

settings:
  goose_provider: "openrouter"
  goose_model: "anthropic/claude-haiku-4-5"

extensions:
  - type: builtin
    name: developer
