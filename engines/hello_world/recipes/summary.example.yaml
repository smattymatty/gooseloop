version: "1.0.0"
title: "hello-world summary"
description: "Render the operator_actions ledger and the list of greetings written."

context:
  - label: "REVIEW JSON"
    source: env_file:REVIEW_JSON_PATH
    optional: true
  - label: "GREETINGS"
    source: glob:${GREETINGS_DIR}/*.txt
    optional: true

prompt: |
  You are the summary phase of the hello-world reference engine.

  Render a markdown report covering:

  1. The names that were greeted (from REVIEW JSON's routing[]).
  2. The greetings that were actually written (from the GREETINGS block).
  3. Any operator_actions the review or body left in the ledger.

  Keep it under 200 words. No sentinel-wrapped JSON required for summary.

settings:
  goose_provider: "openrouter"
  goose_model: "anthropic/claude-haiku-4-5"

extensions: []
