version: "1.0.0"
title: "doc-drift review"
description: "Report the deterministic triage to the operator. Routing is handled by the engine, not here."

context:
  - label: "DOC-DRIFT TRIAGE"
    source: env_method:drift_candidates

prompt: |
  You are the review phase of the doc-drift engine. The detection and the
  routing are already done, deterministically, by the engine: the DOC-DRIFT
  TRIAGE block above lists every declared and discovered pair with its verdict,
  and the engine has already queued a draft for each CANDIDATE.

  Your only job is to report. Do NOT emit routing (the engine owns it). Do NOT
  re-judge the verdicts. Write a short, plain operator-facing summary of the
  state of the corpus: how many pairs were checked, how many are drifting, any
  map errors or collection problems worth the operator's eye.

  Keep insights factual and drawn only from the table (for example: which one
  canonical is behind several derived views, or that a whole collection failed
  to expand). Do not invent causes.

  Output your reply ending with a JSON object wrapped in:

      <<<DELIVERABLE_JSON>>>
      { ... }
      <<<END_DELIVERABLE>>>

  Required keys: protocol_version, status, summary, insights, routing,
  operator_actions. Set status to "done", routing to [], and operator_actions
  to [] — the engine raises the real operator actions after the drafts are
  written and their verdicts are known.

  Storm voice: no em-dashes, no emojis, no filler.

settings:
  goose_provider: "openrouter"
  goose_model: "anthropic/claude-haiku-4-5"

extensions: []
