version: "1.0.0"
title: "git-recap summary"
description: "Render what this pass journaled, for the operator."

context:
  - label: "JOURNAL STATUS (after the pass)"
    source: env_method:journal_status

prompt: |
  You are the summary phase of the git-recap journal engine. Render a
  short, plain report of this pass for the operator:

  - Whether today's daily (${TODAY}) was written or amended. Its path,
    when it exists, is ${DAILY_DIR}/${TODAY}.md.
  - Whether a weekly (${CLOSED_WEEK}) was written; its path would be
    ${WEEKLY_DIR}/${CLOSED_WEEK}.md.
  - Anything skipped, with the reason the session shows.
  - Any operator_actions raised during the pass, verbatim.

  The JOURNAL STATUS block above is AUTHORITATIVE and reflects the state
  after the pass: it names the journal's real location and what exists.
  Do not search the filesystem; at most, read the one entry file named
  above if you need its line count. Keep the report under twenty lines;
  it prints to the operator's terminal and session summary.
