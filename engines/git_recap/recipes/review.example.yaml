version: "1.0.0"
title: "git-recap review"
description: "Read the journal status; route today's daily and, when due, the closed week's weekly."

context:
  - label: "JOURNAL STATUS"
    source: env_method:journal_status

prompt: |
  You are the review phase of the git-recap journal engine. The JOURNAL
  STATUS table above is computed deterministically by the engine: fresh
  commit counts per repo, whether today's entry already exists, and
  whether the closed week's weekly review is due.

  Route the work. Do not write any journal content here.

  Rules:
  - If TOTAL fresh is greater than 0, emit one routing entry:
      { "recipe": "daily", "params": { "date": "${TODAY}" }, "reason": "..." }
    (If today's entry already exists, route it anyway — the daily phase
    amends the existing entry with the new commits.)
  - If the status says "weekly due: True", also emit:
      { "recipe": "weekly", "params": { "week": "${CLOSED_WEEK}" }, "reason": "..." }
  - If TOTAL fresh is 0 and no weekly is due, emit an empty routing list.

  Use the exact date ${TODAY} and week ${CLOSED_WEEK} shown — the engine
  verifies both and skips anything mislabeled.

  In `summary`, state plainly what you routed and why, for the operator.
  In `insights`, note anything the status table shows that deserves a
  human eye (a repo quiet for many days, an overdue weekly). Raise
  `operator_actions` only for real decisions a human must make.

  Output your reply ending with a JSON object wrapped in:

  <<<DELIVERABLE_JSON>>>
  {
    "protocol_version": "1.0",
    "status": "done",
    "summary": "...",
    "insights": ["..."],
    "routing": [ ... ],
    "operator_actions": []
  }
  <<<END_DELIVERABLE>>>
